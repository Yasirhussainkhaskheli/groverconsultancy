kind = "web"
previewPath = "/"
title = "Grover Consult"
version = "1.0.0"
id = "artifacts/grover-consult"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 25708
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/grover-consult run dev"

[services.env]
PORT = "25708"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/grover-consult", "run", "build"]
publicDir = "artifacts/grover-consult/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
