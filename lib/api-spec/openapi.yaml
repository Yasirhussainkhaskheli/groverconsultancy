openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Grover Consult API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: leads
    description: Lead generation / contact form
  - name: insights
    description: Blog / Insights content
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /leads:
    post:
      operationId: submitLead
      tags: [leads]
      summary: Submit a contact / lead form
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeadInput"
      responses:
        "201":
          description: Lead submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"

  /insights:
    get:
      operationId: getInsights
      tags: [insights]
      summary: Get all insights/blog posts
      responses:
        "200":
          description: List of insights
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Insight"

  /insights/{id}:
    get:
      operationId: getInsightById
      tags: [insights]
      summary: Get a single insight by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Insight found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Insight"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    LeadInput:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        company:
          type: string
        phone:
          type: string
        service:
          type: string
        message:
          type: string
      required: [name, email, message]

    Lead:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        company:
          type: string
        phone:
          type: string
        service:
          type: string
        message:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, name, email, message, createdAt]

    Insight:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        slug:
          type: string
        excerpt:
          type: string
        content:
          type: string
        category:
          type: string
        imageUrl:
          type: string
        publishedAt:
          type: string
          format: date-time
      required: [id, title, slug, excerpt, content, category, publishedAt]

    Error:
      type: object
      properties:
        message:
          type: string
      required: [message]
